# conf\apoc.conf

# permit APOC without security checks
dbms.security.procedures.unrestricted=apoc.*

# allow all procedures (simplest)
#dbms.security.procedures.allowlist=*

# …or, if you want to be explicit:
#dbms.security.procedures.allowlist=apoc.*,dbms.*

apoc.import.file.enabled=true
apoc.export.file.enabled=true      # harmless on the destination
